<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line { font-family: 'Fira Code', Consolas, monospace; font-size: 16px; fill: #e8e8e8; }
      .prompt { fill: #8a8a8a; }
      .cursor { animation: blink 1.2s steps(1) infinite; }
      @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
    </style>
  </defs>

  <rect x="0" y="0" width="700" height="220" rx="12" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>

  <!-- window dots -->
  <circle cx="24" cy="24" r="6" fill="#4a4a4a"/>
  <circle cx="46" cy="24" r="6" fill="#4a4a4a"/>
  <circle cx="68" cy="24" r="6" fill="#4a4a4a"/>
  <line x1="0" y1="44" x2="700" y2="44" stroke="#2a2a2a" stroke-width="1"/>

  <text x="24" y="80" class="line"><tspan class="prompt">$ </tspan>whoami</text>
  <text x="24" y="106" class="line">&gt; vadim_kashapov — frontend developer</text>

  <text x="24" y="140" class="line"><tspan class="prompt">$ </tspan>cat skills.txt</text>
  <text x="24" y="166" class="line">&gt; javascript, react, git, docker</text>

  <text x="24" y="200" class="line"><tspan class="prompt">$ </tspan>echo "always shipping"<tspan class="cursor">▌</tspan></text>
</svg>
