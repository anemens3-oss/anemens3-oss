<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="60%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="hillMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#454545"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#sky)"/>

  <!-- stars -->
  <circle cx="80" cy="40" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="160" cy="70" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="1050" cy="35" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="980" cy="80" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="1120" cy="55" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="40" cy="100" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="1150" cy="110" r="0.8" fill="#ffffff" opacity="0.3"/>

  <!-- far hills -->
  <path d="M0,190 Q150,140 300,180 T600,170 T900,190 T1200,160 L1200,300 L0,300 Z" fill="url(#hillFar)"/>

  <!-- mid hills -->
  <path d="M0,220 Q200,170 400,215 T800,210 T1200,200 L1200,300 L0,300 Z" fill="url(#hillMid)"/>

  <!-- near hills -->
  <path d="M0,255 Q250,210 500,250 T1000,245 T1200,235 L1200,300 L0,300 Z" fill="url(#hillNear)"/>

  <!-- code icon -->
  <text x="600" y="90" font-family="Fira Code, Consolas, monospace" font-size="22" fill="#8a8a8a" text-anchor="middle">&lt;/&gt;</text>

  <!-- name -->
  <text x="600" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff" text-anchor="middle">Vadim Kashapov</text>

  <!-- subtitle -->
  <text x="600" y="172" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#c9c9c9" text-anchor="middle">Frontend Web Developer</text>
</svg>
